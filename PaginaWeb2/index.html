<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js"></script>
    <title>SICOSIS3DFX</title>
</head>
<body>
    <nav class="nav-carrusel">
        <button onclick="anteriorImagen()">←</button><!-- alt + 27  -->
        <img id="imagenCarrusel" src="source/img/ie5uinl8cqaf1.png" alt="Imagen Carrusel">
        <button onclick="siguienteImagen()">→</button><!-- alt + 26  -->
    </nav>

    <div class="menu">
        <div class="d-flex justify-content-between w-100 align-items-center">
            <button class="hamburguesa btn btn-outline-dark" onclick="toggleMenu()">≡</button>
        </div>        
        <div class="menu-opciones mt-3" id="menuOpciones">
            <button class="btn btn-primary m-1" onclick="mostrar('header')">Formulario Registro</button>
            <button class="btn btn-success m-1" onclick="mostrar('aside')">Editar Contacto</button>
            <button class="btn btn-warning m-1" onclick="mostrar('section1')">Mostrar Sección 1</button>
            <button class="btn btn-danger m-1" onclick="mostrar('section3')">Eliminar Contactos</button>
        </div>
    </div>

    <section id="section2">
        <div class="contenido" id="contenido">
            <header id="header" class="oculto">
                <div class="contenido-interno">
                    <h3>Formulario De Registro</h3>
                    <form id="formContacto">
                        <div class="mb-3">
                            <label for="nombre" class="form-label">Nombre</label>
                            <input type="text" class="form-control"  id="nombre">
                        </div>
                        <div class="mb-3">
                            <label for="correo" class="form-label">Correo</label>
                            <input type="text" class="form-control"  id="correo">
                        </div>
                        <button type="submit" class="btn btn-primary">Guardar</button>
                    </form>
                    <div id="mensajeGuardado" class="mt-3 text-success"></div>
                </div>
            </header>

            <aside  id="aside"  >
                <div class="contenido-interno">
                    <h3>Editar Contactos</h3>
                    <table id="tablaEditar" class="table table-striped table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>#</th>
                                <th>Nombre</th>
                                <th>Correo</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            
                        </tbody>
                    </table>
                </div>
            </aside>

            <section  class="oculto" id="section1">
                <div class="contenido-interno">
                    <p>♥ Contenido del SECTION 1 ♥</p>
                </div>
            </section>

            <section   id="section3"  class="oculto">
                <div class="contenido-interno">
                    <h3>Eliminar Contactos</h3>
                    <table id="tablaContactos" class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Nombre</th>
                                <th>Correo</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                
                        </tbody>
                    </table>

                </div>
            </section>
        </div>
    </section>

    
    
</body>
</html>
