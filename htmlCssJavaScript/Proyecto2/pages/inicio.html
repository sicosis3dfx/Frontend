<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <script src="../js/app.js"></script>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    
    <div id="nav-container"></div>
    
    <hr class="border-light">

    <div class="container py-5">
        <h2 class="fw-blod mb-1 animar">👋 Bienvenido 🫡</h2>
        <p>Ingresa tu nombre y el sitio te recordará</p>

        <div id="div-saludo" class="alert alert-primary animar" style="display: none;">
            <p class="mb-1 fw-semibold" id="texto-saludo">Holas</p>
            <small>Tu nombre está guardado en el localStorage</small>
        </div>

        <div class="tarjeta animar" id="div-formulario">
            <label for="input-nombre" class="form-label fw-semibold">¿Cuál es tu nombre?</label>
            <div class="input-group">
                <input type="text" class="form-control" id="input-nombre" placeholder="Escribe tu nombre" maxlength="40">
                <button class="btn btn-primary" onclick="guardarNombre()">Guardar 💾</button>
            </div>
            <small class="text-muted mt-2 d-block">
                💡 Cierra esta página, vuelve abrirla y verás que el sitio te recuerda.
            </small>
        </div>

        <div class="text-end mt-2" id="div-olvidar" style="display: none;">
            <button class="btn btn-sm btn-outline-danger">
                🗑️ Olvidar mi nombre
            </button>
        </div>
    </div>

    <hr class="border-light">
    <div id="footer-container"></div>
</body>
</html>
