<!-- 
  contacto.html - Página de contacto con datos de la veterinaria y formulario de mensajes.
  Incluye un script de validación personalizado para el campo "Nombre".
-->

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Veterinaria Central</title>
    
    <!-- Bootstrap CSS desde CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- 
      Hoja de estilos propia. 
      La ruta "../css/style.css" indica que este archivo HTML está dentro de la carpeta "pages".
    -->
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!-- Contenedor donde app.js cargará la barra de navegación (nav.html) -->
    <div id="nav-container"></div>

    <main class="container my-5"> <!-- my-5: margen vertical grande (3rem aprox) -->
        <div class="row g-5"> <!-- g-5: espacio entre columnas de nivel 5 (3rem) -->
            
            <!-- Columna izquierda: información de contacto -->
            <div class="col-md-5 animar"> <!-- En pantallas medianas ocupa 5 de 12 columnas. .animar es clase propia para animación -->
                <h2 class="fw-bold mb-4">Ponte en contacto</h2>
                <p class="text-secondary">Estamos en Renca para atender a tus mascotas con el mejor cuidado profesional.</p>
                
                <div class="mt-4"> <!-- mt-4: margen superior de nivel 4 -->
                    <p><strong>📍 Dirección:</strong> Av. Condell 1234, Renca, Santiago.</p>
                    <p><strong>📞 Teléfono:</strong> +56 9 1234 5678</p>
                    <p><strong>✉️ Email:</strong> contacto@huellitasfelices.cl</p>
                </div>
            </div>

            <!-- Columna derecha: formulario -->
            <div class="col-md-7 animar">
                <div class="tarjeta"> <!-- Clase personalizada definida en style.css (aspecto de tarjeta) -->
                    <h3 class="h5 mb-4">Envíanos un mensaje</h3> <!-- Aplica estilo visual de h5 a un h3 para mantener semántica -->
                    
                    <form id="formContacto"> <!-- ID usado en el script para capturar el evento submit -->
                        
                        <!-- Campo Nombre -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nombre Completo</label>
                            <!-- 
                              id="contactoNombre" -> usado en JS para leer el valor.
                              .form-control -> input con estilo Bootstrap.
                              maxlength="120" y required -> validaciones nativas HTML5.
                            -->
                            <input type="text" id="contactoNombre" class="form-control" 
                                   placeholder="Ingresa tu nombre completo" maxlength="120" required>
                        </div>
                        
                        <!-- Campo Correo Electrónico -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Correo Electrónico</label>
                            <!-- 
                              type="email" -> el navegador valida formato de email automáticamente.
                              No tiene ID porque el script no lo modifica directamente.
                            -->
                            <input type="email" class="form-control" 
                                   placeholder="nombre@correo.com" maxlength="120" required>
                        </div>
                        
                        <!-- Campo Asunto -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Asunto</label>
                            <input type="text" id="contactoAsunto" class="form-control" 
                                   placeholder="¿De qué trata tu consulta?" maxlength="120" required>
                        </div>
                        
                        <!-- Campo Mensaje (textarea) -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Mensaje</label>
                            <!-- 
                              <textarea> con .form-control para estilo Bootstrap.
                              rows="4" -> altura visible de 4 líneas.
                            -->
                            <textarea class="form-control" rows="4" placeholder="Escribe aquí tu mensaje..." required></textarea>
                        </div>
                        
                        <!-- 
                          Botón de envío.
                          .btn .btn-primary .w-100 .fw-bold .py-2 (padding vertical extra).
                          type="submit" envía el formulario.
                        -->
                        <button type="submit" class="btn btn-primary w-100 fw-bold py-2">Enviar Mensaje</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <!-- Contenedor para cargar el footer mediante app.js -->
    <div id="footer-container"></div>

    <!-- Bootstrap JS (necesario para el menú hamburguesa del nav) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Script propio que carga nav y footer -->
    <script src="../js/app.js"></script>

    <!-- 
      Script embebido: validación extra antes de enviar el formulario.
      Se coloca al final para que el DOM ya esté cargado.
    -->
    <script>
        // "Escucha" el evento 'submit' del formulario con id "formContacto".
        document.getElementById('formContacto').addEventListener('submit', (e) => {
            // Obtiene el valor del campo de nombre y le quita espacios en blanco al inicio y final (.trim()).
            const nombre = document.getElementById('contactoNombre').value.trim();
            
            // Expresión regular (regex): conjunto de reglas que definen un patrón de texto.
            // ^               -> inicio del string
            // [a-zA-Z... ]    -> clase de caracteres: solo letras (mayúsculas/minúsculas, acentos, ñ) y espacios.
            // +               -> el carácter anterior debe aparecer una o más veces.
            // $               -> fin del string.
            // Esta regex garantiza que TODO el texto sean letras o espacios.
            const soloLetras = /^[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+$/;

            // .test(valor) verifica si el string cumple con el patrón. Devuelve true o false.
            if (!soloLetras.test(nombre)) {
                // Si NO cumple (contiene números u otros símbolos):
                e.preventDefault(); // Evita que el formulario se envíe.
                alert("El nombre solo puede contener letras. Por favor, corrígelo.");
            } else {
                // Si SÍ cumple:
                // El formulario se enviará normalmente.
                alert("¡Mensaje enviado con éxito! Nos contactaremos contigo pronto.");
            }
        });
    </script>
</body>
</html>
