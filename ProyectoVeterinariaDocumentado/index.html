<!-- 
  index.html - Página principal del sistema de gestión veterinaria.
  Utiliza Bootstrap 5.3.3 para estilos y componentes, y dos archivos JS propios:
  - app.js (posiblemente para lógica general o carga de componentes)
  - script.js (lógica específica de esta página: formulario, tabla, carrusel)
-->

<!DOCTYPE html>
<html lang="es">
<head>
    <!-- Codificación de caracteres UTF-8 para soportar tildes y caracteres especiales -->
    <meta charset="UTF-8">
    
    <!-- 
      Viewport: necesario para diseño responsive.
      width=device-width -> el ancho del viewport igual al ancho del dispositivo.
      initial-scale=1.0 -> zoom inicial 1:1.
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Veterinaria Central - Gestión</title>
    
    <!-- 
      Bootstrap CSS desde CDN (Content Delivery Network).
      Versión 5.3.3. Proporciona todas las clases de estilos que usaremos.
    -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Hoja de estilos personalizada que complementa o sobrescribe estilos de Bootstrap -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 
      Contenedor vacío para la barra de navegación.
      Se espera que JavaScript (probablemente app.js) cargue aquí el contenido de nav.html.
      Así se reutiliza el mismo nav en todas las páginas.
    -->
    <div id="nav-container"></div>

    <!-- 
      HEADER con carrusel de imágenes manual.
      Clases personalizadas (no Bootstrap):
        .nav-carrusel -> probablemente define posición relativa y estilos del contenedor.
        .animar -> clase para animaciones CSS (definida en style.css).
    -->
    <header class="nav-carrusel animar">
        <!-- 
          Botón de flecha izquierda.
          Clases propias: .btn-flecha .izq
          onclick="anteriorImagen()" -> llama a función JavaScript que cambiará la imagen.
        -->
        <button class="btn-flecha izq" onclick="anteriorImagen()">←</button>
        
        <!-- 
          Imagen del carrusel.
          id="imagenCarrusel" -> identificador para manipular con JS (cambiar src).
          src inicial: "source/img/4.jpg".
        -->
        <img id="imagenCarrusel" src="source/img/4.jpg" alt="Mascotas">
        
        <!-- Botón de flecha derecha -->
        <button class="btn-flecha der" onclick="siguienteImagen()">→</button>
    </header>

    <!-- 
      MAIN: contenido principal.
      .container -> contenedor Bootstrap centrado y con ancho máximo según breakpoint.
      .my-5 -> margin vertical (eje Y) de nivel 5 (3rem, aprox 48px) arriba y abajo.
    -->
    <main class="container my-5">
        <!-- 
          .row -> fila del grid de Bootstrap.
          .g-4 -> gutter (espacio entre columnas) de nivel 4 (1.5rem, 24px aprox).
        -->
        <div class="row g-4">
            <!-- 
              Columna del formulario.
              .col-md-4 -> en pantallas medianas (≥768px) ocupa 4/12 columnas (un tercio),
                           en móviles apila al 100%.
              .animar -> clase para animación, probablemente fade-in o slide.
            -->
            <div class="col-md-4 animar">
                <!-- 
                  .tarjeta -> clase personalizada (definida en style.css) para estilos de tarjeta.
                  .h-100 -> altura 100% (para igualar altura con la columna de al lado si es necesario).
                -->
                <div class="tarjeta h-100">
                    <!-- 
                      Título del formulario.
                      .h5 -> aplica estilo de encabezado h5 aunque sea un h3 (utilidad de Bootstrap).
                      .mb-4 -> margin-bottom de nivel 4.
                      El id="tituloForm" se modificará con JS al editar (ej. "Editar Paciente").
                    -->
                    <h3 class="h5 mb-4" id="tituloForm">🐾 Registrar Paciente 🐾</h3>
                    
                    <!-- 
                      FORMULARIO.
                      id="formMascota" -> identificador para capturar el evento 'submit' con JS.
                    -->
                    <form id="formMascota">
                        <!-- 
                          Campo oculto para guardar el índice del elemento que se está editando.
                          Sin valor inicial. Al editar se llena con el índice correspondiente.
                        -->
                        <input type="hidden" id="indexEdicion">
                        
                        <!-- Campo Nombre Mascota -->
                        <div class="mb-3"> <!-- margin-bottom de nivel 3 (1rem) -->
                            <label class="form-label fw-bold">Nombre Mascota 🐶 😺</label>
                            <!-- 
                              .form-control -> estilo de campo de formulario Bootstrap.
                              maxlength="120" -> máximo de caracteres permitidos.
                              required -> validación HTML5.
                            -->
                            <input type="text" id="nombreMascota" class="form-control" 
                                   placeholder="Ingresa el nombre de la mascota" maxlength="120" required>
                            <!-- 
                              Pequeño elemento para mostrar error de validación.
                              .text-danger -> color rojo de Bootstrap.
                              .error-campo -> clase personalizada (posiblemente display:none por defecto).
                            -->
                            <small id="errorNombre" class="text-danger error-campo"></small>
                        </div>

                        <!-- Campo Dueño -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Dueño</label>
                            <input type="text" id="nombreDueno" class="form-control" 
                                   placeholder="Ingresa el nombre del dueño" maxlength="120" required>
                            <small id="errorDueno" class="text-danger error-campo"></small>
                        </div>

                        <!-- Campo Teléfono -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Teléfono 📲</label>
                            <!-- 
                              type="tel" -> teclado numérico en móviles.
                              placeholder sugiere formato 569...
                            -->
                            <input type="tel" id="telefonoDueno" class="form-control" 
                                placeholder="Ej: 56912345678" maxlength="15" required>
                            <small id="errorTelefono" class="text-danger error-campo"></small>
                        </div>

                        <!-- Fila con dos columnas internas: Edad y Tipo -->
                        <div class="row">
                            <!-- Edad (mitad izquierda) -->
                            <div class="col-6 mb-3"> <!-- col-6: siempre ocupa la mitad (6/12) -->
                                <label class="form-label fw-bold">Edad (años)</label>
                                <!-- 
                                  type="number" -> solo números, con flechas para incrementar.
                                  min="0" max="30" -> rango permitido.
                                -->
                                <input type="number" id="edadMascota" class="form-control" 
                                       placeholder="0-30" min="0" max="30" required>
                                <small id="errorEdad" class="text-danger error-campo"></small>
                            </div>
                            <!-- Tipo (mitad derecha) -->
                            <div class="col-6 mb-3">
                                <label class="form-label fw-bold">Tipo</label>
                                <!-- 
                                  .form-select -> estilo de lista desplegable de Bootstrap.
                                  required -> obligatorio.
                                -->
                                <select id="tipoMascota" class="form-select" required>
                                    <option value="">Selecciona...</option>
                                    <option value="Perro">Perro</option>
                                    <option value="Gato">Gato</option>
                                    <option value="Exótico">Exótico</option>
                                </select>
                                <!-- No tiene elemento de error, lo que implica que se valida solo con HTML5 -->
                            </div>
                        </div>
                        
                        <!-- 
                          Botón de envío.
                          .btn -> clase base de botón Bootstrap.
                          .btn-primary -> color de fondo primario (azul por defecto).
                          .w-100 -> ancho 100% del contenedor.
                          .fw-bold -> texto en negrita.
                          type="submit" -> envía el formulario.
                        -->
                        <button type="submit" id="btnGuardar" class="btn btn-primary w-100 fw-bold">Guardar Registro</button>
                    </form>
                </div>
            </div>

            <!-- 
              Columna de la tabla.
              .col-md-8 -> 8/12 columnas (dos tercios) en pantallas medianas.
              .animar -> animación.
            -->
            <div class="col-md-8 animar">
                <div class="tarjeta">
                    <!-- 
                      Contenedor flexible para título y filtro.
                      .d-flex -> display: flex.
                      .justify-content-between -> espacio entre elementos (uno a la izq, otro a la der).
                      .align-items-center -> centrado vertical.
                      .mb-4 -> margen inferior.
                    -->
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h3 class="h5 mb-0">Listado Dinámico</h3>
                        <!-- 
                          Campo de texto para filtrar por tipo.
                          .form-control -> apariencia de input Bootstrap.
                          .w-50 -> ancho 50%.
                          placeholder con emoji de lupa y texto.
                        -->
                        <input type="text" id="filtroTipo" class="form-control w-50" placeholder="🔍 Filtrar por tipo...">
                    </div>
                    
                    <!-- 
                      .table-responsive -> permite scroll horizontal en tablas muy anchas en móviles.
                    -->
                    <div class="table-responsive">
                        <!-- 
                          Tabla.
                          .table -> clase base.
                          .table-hover -> resalta fila al pasar el mouse.
                          .align-middle -> centra verticalmente el contenido de las celdas.
                        -->
                        <table class="table table-hover align-middle" id="tablaMascotas">
                            <!-- Encabezado de tabla con fondo oscuro -->
                            <thead class="table-dark">
                                <tr>
                                    <th>Mascota</th>
                                    <th>Dueño</th>
                                    <th>Teléfono</th>
                                    <th>Edad</th>
                                    <th>Tipo</th>
                                    <!-- 
                                      .text-end -> alinea el texto de la cabecera a la derecha.
                                      Para la columna de botones de acción.
                                    -->
                                    <th class="text-end">Acciones</th>
                                </tr>
                            </thead>
                            <!-- 
                              Cuerpo de la tabla vacío. Se llenará dinámicamente con JS 
                              al agregar registros desde el formulario.
                            -->
                            <tbody>
                                <!-- Las filas se generarán con script.js -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 
      Contenedor para el footer. Similar a #nav-container,
      se cargará footer.html mediante JavaScript.
    -->
    <div id="footer-container"></div>

    <!-- 
      Bootstrap JS Bundle: incluye Popper.js (para tooltips, dropdowns, etc.) y los plugins de Bootstrap.
      Necesario para el funcionamiento de componentes interactivos como el navbar-toggler (en nav.html).
      Se carga al final para no bloquear la carga de la página.
    -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- 
      Scripts propios:
      - app.js: probablemente carga los componentes comunes (nav y footer) en todas las páginas.
      - script.js: lógica específica de index.html (carrusel, CRUD de mascotas, validaciones, filtro).
      Se cargan en este orden: primero app.js (para preparar la interfaz) y luego script.js.
    -->
    <script src="js/app.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
